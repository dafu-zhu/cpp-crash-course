<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C++ Crash Course — FINM 326</title>
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #f5f7fa; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #F7F8FA; }
      ::-webkit-scrollbar-thumb { background: #C4C4C4; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #A8A8A8; }
      /* CLion-style syntax highlighting */
      .token.comment, .token.prolog, .token.doctype, .token.cdata { color: #8C8C8C; font-style: italic; }
      .token.punctuation { color: #2B2B2B; }
      .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol { color: #1750EB; }
      .token.selector, .token.attr-name, .token.string, .token.char, .token.builtin { color: #067D17; }
      .token.operator, .token.entity, .token.url { color: #2B2B2B; }
      .token.atrule, .token.attr-value, .token.keyword { color: #0033B3; font-weight: bold; }
      .token.function { color: #00627A; }
      .token.class-name { color: #000000; }
      .token.regex, .token.important, .token.variable { color: #871094; }
      code[class*="language-"], pre[class*="language-"] { color: #2B2B2B; background: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
